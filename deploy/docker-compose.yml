services:
  postgres:
    image: postgres:17
    container_name: surebet-postgres
    environment:
      POSTGRES_DB: surebet
      POSTGRES_USER: surebet
      POSTGRES_PASSWORD: surebet
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surebet -d surebet"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:  
    image: redis:8
    container_name: surebet-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: surebet-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq:/etc/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend-api:
    build:
      context: ../backend
      target: api
    container_name: surebet-backend-api
    environment:
      APP_NAME: surebet-platform
      APP_ENV: development
      HTTP_ADDRESS: :8080
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDRESS: redis:6379
      POSTGRES_DSN: postgres://surebet:surebet@postgres:5432/surebet?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"

  backend-worker:
    build:
      context: ../backend
      target: worker
    container_name: surebet-backend-worker
    environment:
      APP_NAME: surebet-platform
      APP_ENV: development
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDRESS: redis:6379
      POSTGRES_DSN: postgres://surebet:surebet@postgres:5432/surebet?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
